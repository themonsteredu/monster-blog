<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>더몬스터학원 블로그 자동화</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>📝 블로그 자동화</h1>

  <!-- ===== 설정 (접기) ===== -->
  <details id="settings">
    <summary>⚙️ 설정 (처음 한 번만)</summary>
    <label>Claude(앤트로픽) API 키</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." />
    <label>OpenAI API 키 (선택 — AI 이미지 생성용)</label>
    <input type="password" id="openaiKey" placeholder="sk-... (비우면 카드 이미지 자동 생성)" />

    <div class="sect">🏫 우리 학원 정보 (글·하단 배너·지도에 자동 반영)</div>
    <label>학원명</label>
    <input type="text" id="p_name" placeholder="예: 더몬스터학원" />
    <label>한 줄 소개</label>
    <input type="text" id="p_tagline" placeholder="예: 광주 동구 계림동 · 초등3~고3 수학·교과 전문" />
    <label>전화</label>
    <input type="text" id="p_phone" placeholder="예: 062-653-1599" />
    <label>문자</label>
    <input type="text" id="p_sms" placeholder="예: 010-7627-1003" />
    <label>카카오톡 채널 주소</label>
    <input type="text" id="p_kakao" placeholder="예: http://pf.kakao.com/_WNxezn" />
    <label>네이버 톡톡 주소 (선택)</label>
    <input type="text" id="p_talktalk" placeholder="예: https://talk.naver.com/ct/..." />
    <label>주소</label>
    <input type="text" id="p_address" placeholder="예: 광주광역시 동구 경양로234 118동상가 716호" />
    <label>운영 시간</label>
    <input type="text" id="p_hours" placeholder="예: 평일 오후 2시~밤 10시 / 토요일 오전 9시~오후 8시 30분" />
    <label>지역 키워드 (검색용, 쉼표로)</label>
    <input type="text" id="p_region" placeholder="예: 계림동, 광주 동구, 광주" />
    <label>고정 해시태그 (쉼표로)</label>
    <input type="text" id="p_hashtags" placeholder="예: 계림동수학학원, 광주수학학원, 동구수학학원" />

    <label>전용 틀 (고급 — 비우면 위 정보로 자동 생성)</label>
    <textarea id="template" rows="4" placeholder="비워두면 위 학원 정보로 규칙을 자동 생성합니다"></textarea>
    <button id="saveSettings" class="ghost">설정 저장</button>
    <p class="hint">키·학원 정보는 이 브라우저에만 저장됩니다(외부 전송 없음).</p>
  </details>

  <!-- ===== 입력 ===== -->
  <label>글 종류</label>
  <select id="gltype">
    <option>교육정보</option>
    <option>학원·과목 특징</option>
    <option>특강 안내</option>
  </select>

  <label>주제</label>
  <input type="text" id="topic" placeholder="예: 4월 중간고사 수학 대비" />

  <label>핵심(타겟) 검색 키워드</label>
  <input type="text" id="keyword" placeholder="예: 광주 동구 중등 수학학원" />

  <label>핵심 내용</label>
  <textarea id="core" rows="3" placeholder="특강이면 일정·대상·수강료 / 정보글이면 다룰 포인트"></textarea>

  <label>📷 사진 올리기 (직접 찍은 사진, 여러 장)</label>
  <input type="file" id="photos" accept="image/*" multiple />
  <div id="photoPreview" class="preview"></div>

  <label>이미지 스타일 (사진 없이 쓸 때 참고)</label>
  <select id="style">
    <option>일러스트</option>
    <option>실사</option>
  </select>

  <label>발행 방식</label>
  <select id="pubmode">
    <option value="none">임시저장만 (내가 직접 발행)</option>
    <option value="now">바로 발행</option>
    <option value="reserve">예약 발행</option>
  </select>
  <input type="datetime-local" id="pubwhen" style="display:none" />
  <p class="hint" id="pubhint" style="display:none">예약 시간을 고르세요. 그 시간에 네이버가 자동 발행합니다(컴퓨터 꺼도 됨).</p>

  <label style="display:flex;align-items:center;gap:6px;font-weight:400;margin-top:12px">
    <input type="checkbox" id="trymap" style="width:auto" />
    지도(장소) 자동 첨부 시도 — 실험 기능 (안 되면 끄세요)
  </label>

  <button id="generate" class="primary">✨ 글 생성</button>
  <div id="status" class="status"></div>

  <!-- ===== 결과 ===== -->
  <div id="resultBox" style="display:none">
    <label>제목</label>
    <input type="text" id="outTitle" />
    <label>본문 (수정 가능)</label>
    <textarea id="outBody" rows="10"></textarea>
    <div class="row">
      <button id="copyBtn" class="ghost">📋 복사</button>
      <button id="sendNaver" class="primary">🚀 네이버에 입력</button>
    </div>
    <p class="hint">네이버 블로그 글쓰기 화면을 먼저 연 뒤 "네이버에 입력"을 누르세요.</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
